<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Example</title>
  </head>
  <body>
    <script>
      let a=10;
      a=a+10;
      let name='spandana';
      console.log(a);
      console.log(name+a);
      console.log(a+10);
      var b=20;
      console.log(b);
      var b=56;
      console.log(b);
      const v=7;
      console.log(v);
      let c=78;
      console.log(c);
      /*
      const d=10;
      d=90;
      console.log(d);
      */
     var e=10;
      console.log(e);
      console.log(typeof(name));
      console.log(typeof(a));
    </script>

  </body>
</html>
