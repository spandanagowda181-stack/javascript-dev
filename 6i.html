<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>random number</title>
  </head>
  <body>
    <script>
      let cartQuantity=6;
      if(cartQuantity>10){
        console.log("cart is full,don't update");

      }
      else{
        cartQuantity++;
        console.log(`cart quantity is ${cartQuantity}`);

      }
    </script>

  </body>
</html>
