<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Example</title>
  </head>
  <body>
    <button onclick=
  "console.log('cart quantity: ${cartQuantity}');//string interpolation">show Quantity</button>
    <button onclick="
    cartQuantity+=1;
    console.log('cart quantity: ${cartQuantity}');
    
    ">Add to cart</button>
    <button onclick="
    cartQuantity=cartQuantity+2;
    console.log('cart quantity: ${cartQuantity}');
    ">+2
    </button>
    <button onclick="
    cartQuantity=cartQuantity+3;
    console.log('cart quantity: ${cartQuantity}');
    ">+3</button>
    <button onclick="
    cartQuantity=0;
    console.log('reset cart quantity');
    ">Reset Cart</button>
    <script>
      let cartQuantity = 0;
      
    </script>

  </body>
</html>
